services:

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sales_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - app_net

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 5s
      timeout: 10s
      retries: 12
      start_period: 20s
    networks:
      - app_net
    # GPU support (NVIDIA): uncomment the block below.
    # On Apple Silicon or CPU-only machines, Ollama falls back to CPU automatically.
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  app:
    build: ./app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/sales_db
      OLLAMA_URL: http://ollama:11434
      MODEL_NAME: ${MODEL_NAME:-qwen2.5-coder:7b}
      CSV_PATH: /app/data.csv
    volumes:
      - ./data.csv:/app/data.csv:ro
    depends_on:
      db:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - app_net

volumes:
  postgres_data:
  ollama_data:

networks:
  app_net:
    driver: bridge
    ipam:
      config:
        - subnet: 172.30.0.0/24
